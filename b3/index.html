<html>
    <head>
        <meta charset="utf-8">
        <title>MUXI900 v3.00 beta-3</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body{background: linear-gradient(to bottom right, #000000, #000000);color:white;font-size:28px;text-align:center;margin:0;overflow:hidden;}
            .info{position:relative;top:39%;}
            @font-face {
                font-family: 'logging';
                src: url('fonts/LiberationMono-Regular.ttf');
            }
            #console {
                font-family: 'logging';
            }
        </style>
    </head>
    <body>
        <div class="container">
		<script>
       if (window.applicationCache.status=='0'){window.location.replace("cache.html");}
        </script>
            <img class="colelem" id="pic" alt="&nbsp;MUXI900" src="pic.png" data-image-width="852"/>
            <div class="card">
                <h2 class="card-title">Status</h2>
                <div id="status-container">
                    <p><span class="status-indicator status-running" id="status-icon"></span> <span id="status-text">Lade Exploit...</span></p>
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                </div>
				 
                <!-- Run exploit and reset buttons removed -->
            </div>

            <div class="tabs">
                <div class="tab active" data-tab="console">Console</div>
                <!-- Payloads and settings tabs removed -->
            </div>

            <div class="tab-content active" id="tab-console">
                <pre id="console"></pre>
            </div>

        </div>

        <script src="js/remote-logger.js"></script>
        <script src="js/payload-manager.js"></script>
        <script src="js/ui.js"></script>
        <script src="payload.js"></script>
        <script>
            // Initialize Remote Logger
            document.addEventListener('DOMContentLoaded', function() {
                // Try to get server IP from URL parameter
                const urlParams = new URLSearchParams(window.location.search);
                const serverIp = urlParams.get('server');

                // Logger configuration
                const loggerConfig = {
                    enabled: true,
                    localConsole: true
                };

                // If a server parameter is present, use it
                if (serverIp) {
                    loggerConfig.serverUrl = `http://${serverIp}:3000`;
                }

                // Initialize logger
                window.RemoteLogger.init(loggerConfig);

                // Log browser info
                window.RemoteLogger.info('PSFree initialized', {
                    userAgent: navigator.userAgent,
                    url: window.location.href,
                    timestamp: new Date().toISOString()
                });
            });
        </script>
        <script type="module" src="./alert.mjs"></script>
    </body>
</html>
